name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Black
        run: black --check custom_components/hoymiles_solarpv scripts tests
      - name: isort
        run: isort --check-only custom_components/hoymiles_solarpv scripts tests
      - name: flake8
        run: flake8 custom_components/hoymiles_solarpv scripts tests
      - name: mypy
        run: mypy
      - name: Ruff
        run: ruff check custom_components/hoymiles_solarpv tests
      - name: Run pytest
        run: pytest
