name: Release

# Bumps the integration version and publishes a GitHub Release whenever a pull
# request is merged into main. The bump level defaults to "patch" and can be
# raised to "minor" or "major" by labelling the PR accordingly (or via the
# manual workflow_dispatch input).

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version part to bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Only run for merged PRs (not merely closed) or a manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Determine bump type
        id: bump
        env:
          DISPATCH_BUMP: ${{ github.event.inputs.bump }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          if [ -n "$DISPATCH_BUMP" ]; then
            bump="$DISPATCH_BUMP"
          elif echo " $LABELS " | grep -qiE ' (major|breaking) '; then
            bump="major"
          elif echo " $LABELS " | grep -qiE ' (minor|feature) '; then
            bump="minor"
          else
            bump="patch"
          fi
          echo "type=$bump" >> "$GITHUB_OUTPUT"
          echo "Bump type: $bump"

      - name: Bump manifest version
        id: version
        run: |
          new=$(python scripts/bump_manifest_version.py "${{ steps.bump.outputs.type }}")
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "New version: $new"

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/hoymiles_solarpv/manifest.json
          git commit -m "chore(release): v${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new }}"
          name: "v${{ steps.version.outputs.new }}"
          generate_release_notes: true
