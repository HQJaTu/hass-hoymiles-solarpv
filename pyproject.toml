[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-p no:cacheprovider"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.black]
line-length = 100
target-version = ["py312", "py313"]

[tool.isort]
profile = "black"
line_length = 100
combine_as_imports = true

[tool.mypy]
# python_version is intentionally not pinned: mypy follows the interpreter it
# runs under, which matches the Home Assistant build installed alongside it.
ignore_missing_imports = true
follow_imports = "silent"
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
files = ["custom_components/hoymiles_solarpv"]
