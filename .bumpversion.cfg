# Optional helper for bumping the version locally. The integration manifest is
# the single source of truth used by HACS and the Release workflow.
#   pip install bump2version && bump2version patch
[bumpversion]
current_version = 1.0.0
commit = True
tag = True
tag_name = v{new_version}

[bumpversion:file:custom_components/hoymiles_solarpv/manifest.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"
